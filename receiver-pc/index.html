<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Mirror Receiver</title>
    <style>
      body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #status {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.5);
        padding: 5px 10px;
        border-radius: 4px;
        z-index: 10;
        font-size: 12px;
        display: none;
      }
      canvas {
        flex: 1;
        object-fit: contain;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background: rgba(0,0,0,0.5);
        padding: 5px 10px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 12px;
        display: none;
      }
      #pairing {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(20, 20, 20, 0.95);
        padding: 40px;
        border-radius: 16px;
        text-align: center;
        border: 1px solid #333;
        z-index: 20;
        display: none;
      }
      #pin {
        font-size: 72px;
        font-weight: bold;
        letter-spacing: 10px;
        margin: 20px 0;
        color: #007AFF;
      }
    </style>
  </head>
  <body>
    <div id="status">Initializing...</div>
    <div id="pairing">
        <div style="font-size: 18px; color: #888;">Enter PIN on your phone</div>
        <div id="pin">----</div>
        <div style="font-size: 14px; color: #555;">Waiting for connection...</div>
    </div>
    <canvas id="videoCanvas"></canvas>
    <div id="hud">
      <span id="peer">No Peer</span> | 
      <span id="stats">0 FPS / 0 kbps</span>
    </div>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
